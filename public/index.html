<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DCOM Proxy Box — Raspberry Pi 4G Proxy Management System">
  <title>DCOM Proxy Box — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1>DCOM Proxy Box</h1>
        <p class="login-subtitle">Raspberry Pi 4G Proxy Management</p>
      </div>
      
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="password">Secret Key</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your secret key" 
              required 
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
          <span class="btn-text">Login</span>
          <span class="btn-loader" style="display:none;">
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4" stroke-dashoffset="10"/></svg>
          </span>
        </button>

        <div id="loginError" class="error-message" style="display:none;"></div>
      </form>

      <div class="login-footer">
        <p>Powered by <a href="https://ngocquy.dev" target="_blank" rel="noopener" class="copyright-link">Quy Nguyen</a></p>
      </div>
    </div>

    <div class="login-bg-decoration">
      <div class="bg-circle bg-circle-1"></div>
      <div class="bg-circle bg-circle-2"></div>
      <div class="bg-circle bg-circle-3"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
